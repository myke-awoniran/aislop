name: aislop

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan-smoke:
    name: Scan smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build local CLI
        run: pnpm build

      - run: npx aislop scan

  quality-gate:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: npx aislop@latest ci .
